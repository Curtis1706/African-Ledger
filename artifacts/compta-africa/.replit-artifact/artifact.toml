kind = "web"
previewPath = "/"
title = "ComptaAfrica - SaaS Comptabilité PME"
version = "1.0.0"
id = "artifacts/compta-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19029

[services.development]
run = "pnpm --filter @workspace/compta-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compta-africa", "run", "build" ]
publicDir = "artifacts/compta-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19029"
BASE_PATH = "/"
